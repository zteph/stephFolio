<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <!-- Content Security Policy (basic safe setup) -->
<meta http-equiv="Content-Security-Policy" content="
default-src 'self';
img-src 'self' data: https:;
script-src 'self' 'unsafe-inline' https:;
style-src 'self' 'unsafe-inline' https:;
font-src 'self' https:;
connect-src 'self' https:;
">

<!-- X-Content-Type-Options (NOT fully fixable via meta, but included for completeness) -->
<meta http-equiv="X-Content-Type-Options" content="nosniff">

<!-- Referrer Policy -->
<meta name="referrer" content="no-referrer-when-downgrade">

<!-- Permissions Policy (limited support in meta, but helps a bit) -->
<meta http-equiv="Permissions-Policy" content="
geolocation=(),
camera=(),
microphone=(),
fullscreen=(self)
">

<!-- Basic security hint -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Stephanie Santos</title>
<link rel="stylesheet" href="style.css">
<script src="controller.js" defer></script>
</head>

<body>

<header>
  <!-- LEFT: photo + name -->
  <div class="header-left">
    <img src="images/steph.jpg" alt="steph">
    <p>Stephanie Santos</p>
  </div>
 
  <!-- CENTER: title -->
  <div class="header-center">
    <h1>Contact Me</h1>
  </div>
 
  <!-- RIGHT: buttons -->
  <div class="header-right">
    <a href="index.html" id="homeBtn">HOME</a>
    <button id="logoutBtn" style="display:none;">LOGOUT</button>
    <button id="darkToggle">🌙|☀️</button>
  </div>
</header>

<div class="container">

<div class="card">
    <h2>Get in Touch</h2>
    <p>If you want to reach me, feel free to message me below.</p>
</div>

<div class="card contact-form">
    <h2>Send a Message</h2>

    <label>Full Name</label>
    <input type="text" id="contactName">

    <label>Email</label>
    <input type="email" id="contactEmail">

    <label>Message</label>
    <textarea id="contactMessage" rows="5"></textarea>

    <button onclick="submitContact()">Send Message</button>

    <div id="formMessage"></div>
</div>

<div class="card">
    <h2>Other Contacts</h2>
    <p>Email: stephaniecayogsantos@gmail.com</p>
    <p>Phone: +63 9958895246</p>
    <p>Facebook: Stephanie Cayog Santos</p>
</div>

</div>

</body>
</html>

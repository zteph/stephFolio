<!DOCTYPE html>

<head>
<meta charset="UTF-8">
  <!-- Content Security Policy (basic safe setup) -->
<meta http-equiv="Content-Security-Policy" content="
default-src 'self';
img-src 'self' data: https:;
script-src 'self' 'unsafe-inline' https:;
style-src 'self' 'unsafe-inline' https:;
font-src 'self' https:;
connect-src 'self' https:;
">

<!-- X-Content-Type-Options (NOT fully fixable via meta, but included for completeness) -->
<meta http-equiv="X-Content-Type-Options" content="nosniff">

<!-- Referrer Policy -->
<meta name="referrer" content="no-referrer-when-downgrade">

<!-- Permissions Policy (limited support in meta, but helps a bit) -->
<meta http-equiv="Permissions-Policy" content="
geolocation=(),
camera=(),
microphone=(),
fullscreen=(self)
">

<!-- Basic security hint -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<div class="login-container">

  <h1>Login</h1>

  <label>Username</label>
  <input type="text" id="loginUsername">

  <label>Password</label>
  <div class="password-box">
    <input type="password" id="loginPassword">
    <span class="show-btn" onclick="togglePassword('loginPassword', this)">Show</span>
  </div>

  <button onclick="loginUser()">Login</button>

  <div id="otpSection" style="display:none; margin-top:15px;">
    <label>Enter OTP</label>
    <input type="text" id="otpInput" maxlength="6">
    <button onclick="verifyOTP()">Verify OTP</button>
  </div>

  <p>Don't have an account?</p>
  <a href="../midterm/mtaskreg.html">Register Here</a>

  <div id="messageBox" class="message-box" style="margin-top:10px;"></div>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
  <!-- Content Security Policy (basic safe setup) -->
<meta http-equiv="Content-Security-Policy" content="
default-src 'self';
img-src 'self' data: https:;
script-src 'self' 'unsafe-inline' https:;
style-src 'self' 'unsafe-inline' https:;
font-src 'self' https:;
connect-src 'self' https:;
">

<!-- X-Content-Type-Options (NOT fully fixable via meta, but included for completeness) -->
<meta http-equiv="X-Content-Type-Options" content="nosniff">

<!-- Referrer Policy -->
<meta name="referrer" content="no-referrer-when-downgrade">

<!-- Permissions Policy (limited support in meta, but helps a bit) -->
<meta http-equiv="Permissions-Policy" content="
geolocation=(),
camera=(),
microphone=(),
fullscreen=(self)
">

<!-- Basic security hint -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>
<link rel="stylesheet" href="style.css">
<script src="controller.js" defer></script>
</head>

<body>

<div class="login-container">

<h1>Create Account</h1>

<label>Full Name</label>
<input type="text" id="registerName">

<label>Email</label>
<input type="email" id="registerEmail">

<label>Username</label>
<input type="text" id="registerUsername">

<label>Password</label>

<div class="password-box">
  <input type="password" id="registerPassword">
  <span class="show-btn" onclick="togglePassword('registerPassword',this)">Show</span>
</div>

<button onclick="registerUser()">Register</button>

<!-- DARK MODE BUTTON -->
<button id="darkToggle">🌙|☀️</button>
<a href="index.html" id="registerBtn">BACK</a>

<div id="messageBox" class="message-box"></div>

</div>

</body>
</html>
